name: Build SpatiaLite JDBC (Windows + Linux + macOS ARM)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 and packages
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-geos
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-libspatialite

      - name: Collect Windows native libs
        shell: msys2 {0}
        run: |
          mkdir -p native/Windows/amd64
          cp /mingw64/bin/*.dll native/Windows/amd64/
          ls -la native/Windows/amd64 || true

      - name: Upload Windows natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-windows
          path: native/Windows

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc g++ make libsqlite3-dev libgeos-dev libproj-dev libspatialite-dev

      - name: Collect Linux native libs
        run: |
          mkdir -p native/Linux/amd64
          cp /usr/lib/x86_64-linux-gnu/libspatialite.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libgeos*.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libproj*.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so* native/Linux/amd64/ || true
          ls -la native/Linux/amd64 || true

      - name: Upload Linux natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-linux
          path: native/Linux

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install geos proj libspatialite

      - name: Collect macOS ARM native libs
        run: |
          mkdir -p native/Mac/aarch64
          cp /opt/homebrew/lib/libspatialite.* native/Mac/aarch64/ || true
          cp /opt/homebrew/lib/libgeos* native/Mac/aarch64/ || true
          cp /opt/homebrew/lib/libproj* native/Mac/aarch64/ || true
          # Do NOT copy libsqlite3 — macOS provides it system-wide
          ls -la native/Mac/aarch64 || true

      - name: Upload macOS natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos-arm
          path: native/Mac

  package-jar:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native/

      - name: Debug artifact structure
        run: |
          echo "=== native directory listing ==="
          find native -maxdepth 4 -type d -print || true
          echo "=== natives-windows contents ==="
          ls -la native/natives-windows || true
          echo "=== natives-linux contents ==="
          ls -la native/natives-linux || true
          echo "=== natives-macos-arm contents ==="
          ls -la native/natives-macos-arm || true

      - name: Copy natives into JAR structure
        run: |
          mkdir -p src/main/resources/org/spatialite/native/Windows
          mkdir -p src/main/resources/org/spatialite/native/Linux
          mkdir -p src/main/resources/org/spatialite/native/Mac

          # Copy the architecture subfolders that were uploaded
          cp -r native/natives-windows/Windows/amd64 src/main/resources/org/spatialite/native/Windows/ || true
          cp -r native/natives-linux/Linux/amd64 src/main/resources/org/spatialite/native/Linux/ || true
          cp -r native/natives-macos-arm/Mac/aarch64 src/main/resources/org/spatialite/native/Mac/ || true

          echo "Final resources layout:"
          find src/main/resources/org/spatialite/native -maxdepth 3 -type f -print || true

      - name: Build JDBC JAR
        run: mvn -q -DskipTests package

      - name: Upload final JAR
        uses: actions/upload-artifact@v4
        with:
          name: spatialite-jdbc-crossplatform
          path: target/*.jar
