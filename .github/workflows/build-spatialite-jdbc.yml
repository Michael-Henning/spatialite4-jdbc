name: Build SpatiaLite JDBC (Windows + Linux + macOS ARM)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MSYS2 and packages
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-geos
            mingw-w64-x86_64-proj
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-libspatialite

      - name: Collect Windows native libs
        shell: msys2 {0}
        run: |
          mkdir -p native/Windows/amd64
          cp /mingw64/bin/*.dll native/Windows/amd64/
          ls -la native/Windows/amd64 || true

      - name: Upload Windows natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-windows
          path: native/Windows

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc g++ make libsqlite3-dev libgeos-dev libproj-dev libspatialite-dev

      - name: Collect Linux native libs
        run: |
          mkdir -p native/Linux/amd64
          cp /usr/lib/x86_64-linux-gnu/libspatialite.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libgeos*.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libproj*.so* native/Linux/amd64/ || true
          cp /usr/lib/x86_64-linux-gnu/libsqlite3.so* native/Linux/amd64/ || true
          ls -la native/Linux/amd64 || true

      - name: Upload Linux natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-linux
          path: native/Linux

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install geos proj libspatialite

      - name: Collect macOS ARM native libs
        run: |
          mkdir -p native/Mac/aarch64
          cp /opt/homebrew/lib/libspatialite.* native/Mac/aarch64/ || true
          cp /opt/homebrew/lib/libgeos* native/Mac/aarch64/ || true
          cp /opt/homebrew/lib/libproj* native/Mac/aarch64/ || true
          # Do NOT copy libsqlite3 — macOS provides it system-wide
          ls -la native/Mac/aarch64 || true

      - name: Upload macOS natives
        uses: actions/upload-artifact@v4
        with:
          name: natives-macos-arm
          path: native/Mac

  package-jar:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux, build-macos-arm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: native/

      - name: Debug artifact structure
        run: |
          echo "=== native directory listing ==="
          find native -maxdepth 6 -type d -print || true
          echo "=== natives-windows contents ==="
          ls -la native/natives-windows || true
          echo "=== natives-linux contents ==="
          ls -la native/natives-linux || true
          echo "=== natives-macos-arm contents ==="
          ls -la native/natives-macos-arm || true

      - name: Copy natives into JAR structure and add Windows aliases
        run: |
          set -e

          mkdir -p src/main/resources/org/spatialite/native/Windows/amd64
          mkdir -p src/main/resources/org/spatialite/native/Linux/amd64
          mkdir -p src/main/resources/org/spatialite/native/Mac/aarch64

          # Copy Windows natives
          if [ -d native/natives-windows/amd64 ]; then
            echo "Copying Windows natives"
            cp -r native/natives-windows/amd64/* src/main/resources/org/spatialite/native/Windows/amd64/
          else
            echo "Windows natives folder not found at native/natives-windows/amd64"
          fi

          # Copy Linux natives
          if [ -d native/natives-linux/amd64 ]; then
            echo "Copying Linux natives"
            cp -r native/natives-linux/amd64/* src/main/resources/org/spatialite/native/Linux/amd64/
          else
            echo "Linux natives folder not found at native/natives-linux/amd64"
          fi

          # Copy macOS ARM natives
          if [ -d native/natives-macos-arm/aarch64 ]; then
            echo "Copying macOS ARM natives"
            cp -r native/natives-macos-arm/aarch64/* src/main/resources/org/spatialite/native/Mac/aarch64/
          else
            echo "macOS natives folder not found at native/natives-macos-arm/aarch64"
          fi

          # Create Windows DLL aliases
          WIN_DIR=src/main/resources/org/spatialite/native/Windows/amd64
          if [ -d "$WIN_DIR" ]; then
            cd "$WIN_DIR"

            # find libspatialite-*.dll
            if ls libspatialite-*.dll 1> /dev/null 2>&1; then
              SPATIALITE_SRC=$(ls libspatialite-*.dll | head -n1)
              echo "Using $SPATIALITE_SRC to create aliases"
              cp "$SPATIALITE_SRC" spatialite.dll
              cp "$SPATIALITE_SRC" libspatialite.dll
            else
              echo "No libspatialite DLL found to alias"
            fi

            # sqlite alias
            if [ -f libsqlite3-0.dll ]; then
              cp libsqlite3-0.dll sqlite3.dll
            elif [ -f libsqlite3.dll ]; then
              cp libsqlite3.dll sqlite3.dll
            else
              echo "No sqlite3 DLL found to alias"
            fi

            cd - >/dev/null
          fi

          echo "Final resources layout:"
          find src/main/resources/org/spatialite/native -maxdepth 4 -type f -print

      - name: Create Windows DLL aliases for loader
        run: |
          set -e
          WIN_DIR=src/main/resources/org/spatialite/native/Windows/amd64
          if [ -d "$WIN_DIR" ]; then
            echo "Creating Windows DLL aliases in $WIN_DIR"
            cd "$WIN_DIR"
            # find the first libspatialite-*.dll (handles libspatialite-5.dll or -7.dll)
            if ls libspatialite-*.dll 1> /dev/null 2>&1; then
              SPATIALITE_SRC=$(ls libspatialite-*.dll | head -n1)
              echo "Using $SPATIALITE_SRC to create aliases"
              cp "$SPATIALITE_SRC" spatialite.dll
              cp "$SPATIALITE_SRC" libspatialite.dll
            elif [ -f libspatialite.dll ]; then
              echo "libspatialite.dll already present, creating spatialite.dll"
              cp libspatialite.dll spatialite.dll
            else
              echo "No libspatialite found; skipping alias creation"
            fi

            # sqlite3 alias
            if [ -f libsqlite3-0.dll ]; then
              cp libsqlite3-0.dll sqlite3.dll
            elif [ -f libsqlite3.dll ]; then
              cp libsqlite3.dll sqlite3.dll
            else
              echo "No sqlite3 DLL found; skipping sqlite3 alias"
            fi
            cd - >/dev/null
          else
            echo "Windows native directory $WIN_DIR not present; skipping alias creation"
          fi


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build JDBC JAR
        run: mvn -q -DskipTests package

      - name: Upload final JAR
        uses: actions/upload-artifact@v4
        with:
          name: spatialite-jdbc-crossplatform
          path: target/*.jar
